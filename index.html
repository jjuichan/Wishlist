<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pink Wishlist</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#ffb6c1">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <button id="menuBtn">☰</button>
        <h1>Wishlist</h1>
    </header>

    <nav id="sidebar">
        <button id="closeBtn">×</button>
        <h2>목록</h2>
        <div id="treeView"></div>
    </nav>

    <main id="mainContent">
        <section class="add-form">
            <h3>위시리스트 추가</h3>
            <input type="text" id="inputRegion" placeholder="지역 (예: 도쿄)" required>
            <input type="text" id="inputStore" placeholder="매장 (예: 돈키호테)" required>
            <input type="text" id="inputName" placeholder="품목 이름" required>
            <input type="text" id="inputPrice" placeholder="가격">
            <textarea id="inputDesc" placeholder="설명 및 메모"></textarea>
            <input type="file" id="inputImage" accept="image/*">
            <button id="saveBtn">저장하기</button>
        </section>

        <section class="item-list">
            <h3 id="currentViewTitle">전체 보기</h3>
            <div id="itemsContainer"></div>
        </section>
    </main>

    <script src="app.js"></script>
    <script>
        // 서비스 워커 등록 (PWA 필수)
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js')
                .then(() => console.log('Service Worker Registered'));
        }
    </script>
</body>
</html>
